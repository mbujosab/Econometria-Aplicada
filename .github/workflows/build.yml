name: Build and Deploy

on:
  push:
    branches:
      - main
      - ci/build-selectivo-conservador
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio principal
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout del repositorio de datos
      uses: actions/checkout@v4
      with:
        repository: mbujosab/TimeSeriesData
        path: datos_temp

    - name: Borrar contenido antiguo del directorio datos
      run: |
        rm -rf datos/*

    - name: Copiar archivos del repositorio de datos al directorio datos
      run: |
        cp -r datos_temp/* datos/

    - name: Comprobar contenido de datos antes de seguir
      run: |
        echo "Contenido de datos:"
        ls -la datos

    - name: Determinar alcance de build (conservador)
      id: scope
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "manual run -> full build"
          echo "run_full=true" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        BEFORE="${{ github.event.before }}"
        AFTER="${{ github.sha }}"

        if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
          echo "No BEFORE SHA (primer push o caso especial) -> full build"
          echo "run_full=true" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"

        echo "Ficheros cambiados:"
        echo "$CHANGED_FILES"

        if [ -z "$CHANGED_FILES" ]; then
          echo "Sin cambios detectados -> full build por seguridad"
          echo "run_full=true" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Cualquier cambio fuera de org-practicas obliga a build completo (estrategia conservadora)
        NON_PRACTICAS="$(echo "$CHANGED_FILES" | grep -Ev '^(org-practicas/|main/org-practicas/)' || true)"

        # Si hay cambios en prácticas
        PRACTICAS_CHANGED="false"
        if echo "$CHANGED_FILES" | grep -Eq '^(org-practicas/|main/org-practicas/)'; then
          PRACTICAS_CHANGED="true"
        fi

        if [ -n "$NON_PRACTICAS" ]; then
          echo "Hay cambios fuera de org-practicas -> full build"
          echo "run_full=true" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=false" >> "$GITHUB_OUTPUT"
        elif [ "$PRACTICAS_CHANGED" = "true" ]; then
          echo "Solo cambios en org-practicas -> build de practicas"
          echo "run_full=false" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=true" >> "$GITHUB_OUTPUT"
        else
          echo "Caso no contemplado -> full build"
          echo "run_full=true" >> "$GITHUB_OUTPUT"
          echo "run_practicas_only=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies (robusto)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        sudo apt-get -o Acquire::Retries=3 update
        sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
          git emacs pandoc aspell aspell-en aspell-es zip gretl wget
        pip install jupyter nbconvert

    - name: Crear carpeta e instalar la base de datos del Banco de España en Gretl
      run: |
        mkdir -p ~/.gretl/db
        cp -r datos/BaseDeDatosBdE/* ~/.gretl/db/

    - name: Install Python modules
      run: |
        pip install sympy numpy pandas matplotlib dataframe-image statsmodels seaborn scipy

    - name: Exportar backend matplotlib
      run: echo "MPLBACKEND=Agg" >> $GITHUB_ENV

    - name: Verify Jupyter Installation
      run: |
        jupyter kernelspec list

    - name: Install LaTeX (robusto)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
          texlive \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-extra \
          texlive-fonts-recommended \
          texlive-xetex \
          texlive-science \
          python3-pygments \
          texlive-lang-spanish \
          texlive-bibtex-extra \
          texlive-binaries \
          texlive-extra-utils \
          texlive-font-utils \
          texlive-luatex \
          dvipng \
          texlive-latex-base \
          cm-super
        sudo mktexlsr
     
    - name: Verificar tgheros (diagnóstico)
      run: |
        set +e
        which kpsewhich
        kpsewhich tgheros.sty
        echo "kpsewhich_exit=$?"
        ls -l /usr/share/texlive/texmf-dist/tex/latex/psnfss/tgheros.sty || true
        exit 0        
        
    - name: Verificar tgheros
      run: |
        set +e
        echo "KPSEWHICH=$(kpsewhich tgheros.sty)"
        kpsewhich tgheros.sty
        echo "status=$?"
        ls -l /usr/share/texlive/texmf-dist/tex/latex/psnfss/tgheros.sty || true        

    - name: Disable tlmgr (prevent accidental calls)
      run: sudo mv /usr/bin/tlmgr /usr/bin/tlmgr.disabled || true

    - name: Clone Scimax (pin to scimax 3.0 tag)
      run: |
        mkdir -p ~/Software
        git clone https://github.com/jkitchin/scimax.git ~/Software/scimax
        cd ~/Software/scimax
        git fetch --tags
        git checkout -b scimax-3.0 tags/3.0

    - name: Download ox-ipynb.el (pinned to ef9ba54)
      run: |
        wget https://raw.githubusercontent.com/jkitchin/ox-ipynb/ef9ba54/ox-ipynb.el -O ~/Software/scimax/ox-ipynb.el

    - name: Install s.el and dash.el
      run: |
        emacs --batch --eval "(require 'package)" \
                      --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\"))" \
                      --eval "(package-refresh-contents)" \
                      --eval "(package-install 's)" \
                      --eval "(package-install 'dash)"

    - name: Create no-tlmgr.el
      run: |
        mkdir -p ~/.emacs.d
        echo "(setq system-packages-use-sudo nil)" > ~/.emacs.d/no-tlmgr.el
        echo "(setq TeX-install-font-lock nil)" >> ~/.emacs.d/no-tlmgr.el
        echo "(setq TeX-live-install-texmf nil)" >> ~/.emacs.d/no-tlmgr.el

    - name: Verify ox-ipynb Installation
      run: |
        emacs --batch \
              --eval "(add-to-list 'load-path \"~/Software/scimax/\")" \
              --eval "(dolist (dir (directory-files \"~/.emacs.d/elpa/\" t \"^[^.]\")) (add-to-list 'load-path dir))" \
              --eval "(require 'ox-ipynb)"

    - name: Create .binder directory
      run: mkdir -p docs/.binder

    - name: Ficheros de configuracion
      run: |
        emacs --batch org-publish.org -l org -f org-babel-tangle

    - name: Build completo (como antes)
      if: steps.scope.outputs.run_full == 'true'
      run: |
        set -e
        make notebooksYslides
        make practicas
        make calendario
        make publicacion-lecciones
        make publicacion-practicas
        make publicacion

    - name: Build solo practicas (conservador)
      if: steps.scope.outputs.run_practicas_only == 'true'
      run: |
        set -e
        make practicas
        make publicacion-practicas
        make publicacion

    - name: Inspección final de docs
      run: |
        echo "Contenido de docs al final de build:"
        ls -la docs

    - name: Upload docs artifact (modo prueba)
      uses: actions/upload-artifact@v4
      with:
        name: docs-preview
        path: docs

    - name: Deploy docs/ a gh-pages
      if: github.ref == 'refs/heads/main' && steps.scope.outputs.run_full == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.NUEVO_TOKEN_CLASSIC_HASTA_JULIO_2026 }}
        publish_dir: ./docs
        publish_branch: gh-pages
